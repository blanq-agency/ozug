title: Supporter
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              localizable: false
          -
            handle: logo
            field:
              max_files: 1
              container: documents
              folder: supporters
              type: assets
              display: Logo
              localizable: false
              required: true
          -
            handle: link
            field:
              type: link
              display: Link
              localizable: false
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate:
                - 'max:200'
